spring.application.name=fraud-detection-ingestion

# Database Configuration (Falls back to H2 in-memory if Postgres URL is not provided)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:fraud_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Kafka Configuration
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Kafka Consumer Configuration
spring.kafka.consumer.group-id=fraud-scoring-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Kafka Toggle (Defaults to false/in-memory mock mode. Set KAFKA_ENABLED=true for real Kafka)
app.kafka.enabled=${KAFKA_ENABLED:false}

# Custom Security Properties
app.jwt.secret=${APP_JWT_SECRET:changeme-set-a-strong-secret-in-production}
app.jwt.expiration-ms=86400000

# Encryption Key (PII) - Base64 encoded 256-bit key
# In production, this should be in a secure Vault
app.pii.encryption-key=${APP_PII_ENCRYPTION_KEY:changeme-set-a-256-bit-base64-key-in-production}

# FOR CLOUD KAFKA (e.g. Upstash, Confluent Cloud)
# When deploying to Upstash/Confluent, uncomment and configure these:
# spring.kafka.properties.security.protocol=SASL_SSL
# spring.kafka.properties.sasl.mechanism=SCRAM-SHA-256
# spring.kafka.properties.sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required username="${KAFKA_USERNAME:}" password="${KAFKA_PASSWORD:}";
